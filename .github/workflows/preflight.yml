name: Preflight

on:
  push:
    branches: [main]
    paths:
      - '**.ps1'
      - '**.bat'
      - 'agents/**'
      - 'skills/**'
      - 'index.html'
      - 'pro/**'
      - 'docs/**'
      - 'tests/**'
      - '.github/workflows/preflight.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run preflight
        shell: pwsh
        run: |
          .\tests\preflight.ps1

      - name: Prereq simulator (FI)
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge [Version]'5.0' })) {
            Install-Module Pester -Force -SkipPublisherCheck -Scope CurrentUser
          }
          Invoke-Pester tests\prereq-sim.tests.ps1 -Output Detailed -CI
